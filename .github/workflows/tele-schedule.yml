# Lịch bắn báo cáo Telegram — gọi /api/tele trên Vercel
# Bộ hẹn giờ GitHub trễ vô chừng (có hôm nhả job 12h trưa lúc 3h sáng) nên KHÔNG tin giờ của GitHub:
# gõ cửa 20 phút/lần quanh mỗi khung (tránh phút :00 hay kẹt tải), server tự xét GIỜ VN với slot=auto —
# đúng khung 12h/18h/23h mới gửi, mỗi khung chỉ gửi 1 lần (đánh dấu trong KV), ngoài khung im lặng.
# Giờ cron ghi theo UTC = giờ VN trừ 7
name: Ban bao cao Telegram
on:
  schedule:
    - cron: '3,23,43 5-7 * * *'    # khung 12:00 VN (gõ cửa 12:03 → 14:43)
    - cron: '3,23,43 11-13 * * *'  # khung 18:00 VN (18:03 → 20:43)
    - cron: '3,23,43 16-18 * * *'  # khung 23:00 VN (23:03 → 01:43)
  workflow_dispatch:      # bắn tay từ tab Actions: để trống = gửi ngay · gac=auto = qua gác giờ VN (chống trùng khung)
    inputs:
      gac:
        description: 'auto = qua gac gio VN (dung khung 12h/18h/23h moi gui, chong trung) · de trong = gui ngay'
        required: false
        default: ''

jobs:
  fire:
    runs-on: ubuntu-latest
    steps:
      - name: Goi bot bao cao PVH10
        run: |
          if [ -z "${{ secrets.TELE_FIRE_URL }}" ]; then
            echo "Chua khai bao secret TELE_FIRE_URL (Settings -> Secrets and variables -> Actions)"; exit 1
          fi
          URL="${{ secrets.TELE_FIRE_URL }}"
          # chay theo lich -> them slot=auto de server gac gio VN; ban tay tu tab Actions -> gui ngay
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.gac }}" = "auto" ]; then
            case "$URL" in *\?*) URL="$URL&slot=auto";; *) URL="$URL?slot=auto";; esac
          fi
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" "$URL")
          cat /tmp/resp.json; echo
          [ "$code" = "200" ] && grep -q '"ok":true' /tmp/resp.json
