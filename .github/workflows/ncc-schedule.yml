# Lịch cập nhật số dư NCC (PVH14) — gọi /api/ncc?a=poll trên Vercel
# Giờ cron ghi theo UTC = giờ VN trừ 7 · chạy 4 tiếng/lần
name: Cap nhat so du NCC
on:
  schedule:
    - cron: '0 1,5,9,13,17,21 * * *'  # 08h·12h·16h·20h·00h·04h VN
  workflow_dispatch: {}   # cho phép chạy tay từ tab Actions

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Goi API cap nhat so du NCC
        run: |
          if [ -z "${{ secrets.NCC_FIRE_URL }}" ]; then
            echo "Chua khai bao secret NCC_FIRE_URL - bo qua (chua bat tu dong)"; exit 0
          fi
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" "${{ secrets.NCC_FIRE_URL }}")
          cat /tmp/resp.json; echo
          [ "$code" = "200" ] && grep -q '"ok":true' /tmp/resp.json
